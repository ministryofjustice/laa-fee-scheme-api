name: SCA - Software Composition Analysis

on:
  workflow_call:
    secrets:
      SLACK_PROD_WEBHOOK_URL:
        required: true
  workflow_dispatch:

permissions: {}

jobs:
  sca:
    name: Software Composition Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      pull-requests: write
      issues: write
      security-events: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build app jar with gradle
        run: ./gradlew assemble

      - name: Run SCA
        uses: ministryofjustice/devsecops-actions/sca@v1.4.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          renovate: "false"

  notify-slack:
    needs:
      - sca
    if: always() &&
      contains(join(needs.*.result, ' '), 'failure')
    uses: ./.github/workflows/notify-slack.yml
    with:
      scan_name: "SCA - Software Composition Analysis"
      message_details: |
        SCA - Software Composition Analysis: ${{ needs.sca.result }}
    secrets:
      SLACK_PROD_WEBHOOK_URL: ${{ secrets.SLACK_PROD_WEBHOOK_URL }}