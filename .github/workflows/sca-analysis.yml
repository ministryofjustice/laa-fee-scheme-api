name: SCA - Software Composition Analysis

on:
  schedule:
    - cron: '0 8 * * MON'
  workflow_call:
    secrets:
      SLACK_PROD_WEBHOOK_URL:
        required: true
  workflow_dispatch:

permissions: {}

jobs:
  sca:
    name: Software Composition Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      pull-requests: write
      issues: write
      security-events: read

    steps:
      - uses: actions/checkout@v6

      - name: Download built jar
        uses: actions/download-artifact@v5
        with:
          name: scheme-service-jar
          path: build/libs

      - name: Run SCA
        uses: ministryofjustice/devsecops-actions/sca@f965eb1771ec66cfc41d7d57dc607fa6dfbc10ed
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          renovate: "false"
          dependency-review-config-file: "./.github/dependency-review-config.yml"

  notify-slack:
    needs:
      - sca
    if: always() &&
      github.event_name == 'schedule' &&
      github.ref == 'refs/heads/main' &&
      contains(join(needs.*.result, ' '), 'failure')
    uses: ./.github/workflows/notify-slack.yml
    with:
      scan_name: "SCA - Software Composition Analysis"
      message_details: |
        SCA - Software Composition Analysis: ${{ needs.sca.result }}
    secrets:
      SLACK_PROD_WEBHOOK_URL: ${{ secrets.SLACK_PROD_WEBHOOK_URL }}