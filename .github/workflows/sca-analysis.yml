name: SCA - Software Composition Analysis

on:
  schedule:
    - cron: '0 8 * * MON'
  workflow_call:
    secrets:
      SLACK_PROD_WEBHOOK_URL:
        required: true
  workflow_dispatch:

permissions: {}

jobs:
  sca:
    name: Software Composition Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ${{ github.token }}

    permissions:
      contents: write
      pull-requests: write
      issues: write
      security-events: write
      actions: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build app jar with gradle
        run: ./gradlew build

      - name: Build Docker image
        run: docker build -t laa-fee-scheme-api:latest-image .

      - name: Run SCA
        uses: ministryofjustice/devsecops-actions/sca@f965eb1771ec66cfc41d7d57dc607fa6dfbc10ed
        with:
          token: ${{ github.token }}
          docker-images-file: ${{ github.workspace }}/docker-images.json
          renovate: "false"
          dependency-review-config-file: "./.github/dependency-review-config.yml"

  notify-slack:
    needs:
      - sca
    if: always() &&
      github.event_name == 'schedule' &&
      github.ref == 'refs/heads/main' &&
      contains(join(needs.*.result, ' '), 'failure')
    uses: ./.github/workflows/notify-slack.yml
    with:
      scan_name: "SCA - Software Composition Analysis"
      message_details: |
        SCA - Software Composition Analysis: ${{ needs.sca.result }}
    secrets:
      SLACK_PROD_WEBHOOK_URL: ${{ secrets.SLACK_PROD_WEBHOOK_URL }}