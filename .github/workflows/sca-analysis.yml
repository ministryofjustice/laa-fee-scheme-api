name: SCA - Software Composition Analysis

on:
  schedule:
    - cron: '0 8 * * MON'
  push:
    branches:
      - main
  workflow_call:
    secrets:
      SLACK_PROD_WEBHOOK_URL:
        required: true
  workflow_dispatch:

jobs:
  sca:
    name: Software Composition Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ${{ github.token }}

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e  # v6.1.0

      - name: Build app jar with gradle
        run: ./gradlew build

      - name: Build Docker image
        run: docker build -t laa-fee-scheme-api:latest-image .

      - name: Run SCA
        uses: ministryofjustice/devsecops-actions/sca@7dc13c20e2bf541b8a77fa1320a04983b18846f6
        with:
          token: ${{ github.token }}
          docker-images-file: ${{ github.workspace }}/docker-images.json
          renovate: "false"
          dependency-review-config-file: "./.github/dependency-review-config.yml"

  notify-slack:
    permissions:
      contents: read
    needs:
      - sca
    if: always() &&
      github.event_name == 'schedule' &&
      github.ref == 'refs/heads/main' &&
      contains(join(needs.*.result, ' '), 'failure')
    uses: ./.github/workflows/notify-slack.yml
    with:
      scan_name: "SCA - Software Composition Analysis"
      message_details: |
        SCA - Software Composition Analysis: ${{ needs.sca.result }}
    secrets:
      SLACK_PROD_WEBHOOK_URL: ${{ secrets.SLACK_PROD_WEBHOOK_URL }}