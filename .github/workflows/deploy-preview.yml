name: Preview deploy

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: number

    secrets:
      ECR_ROLE_TO_ASSUME:
        required: true

concurrency:
  group: preview-deploy-pr-${{ inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  ecr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          java-version: '25'
          distribution: corretto

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e  # v6.1.0
      - run: ./gradlew clean build

      - name: Login to ECR
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/ecr-auth@main
        id: auth
        with:
          ecr_region: ${{ vars.ECR_REGION }}
          ecr_role: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          role-session-name: preview

      - name: Build and push preview image
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/build-and-push@main
        with:
          dockerfile_path: ./Dockerfile
          image_registry: ${{ steps.auth.outputs.image_registry }}
          image_repo: ${{ vars.ECR_REPOSITORY }}
          image_tag: pr-${{ inputs.pr_number }}

  deploy-preview:
    needs: ecr
    uses: ./.github/workflows/_deploy-to-env.yml
    with:
      environment: dev
      preview_id: pr-${{ inputs.pr_number }}
      preview_schema_id: pr_${{ inputs.pr_number }}
    secrets: inherit
