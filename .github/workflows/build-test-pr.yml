name: PR build and test
on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize, labeled]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Build and run tests
        uses: './.github/actions/build-and-test'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  pitest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          distribution: 'corretto'
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c  # v5

      - name: Run pitest (mutation testing)
        run: ./gradlew :scheme-service:pitest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload pitest HTML report
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5
        with:
          name: pitest-report
          path: scheme-service/build/reports/pitest
          retention-days: 14

  snyk-vulnerability-scan:
    uses: ./.github/workflows/snyk-vulnerability-scans.yml
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SLACK_PROD_WEBHOOK_URL: ${{ secrets.SLACK_PROD_WEBHOOK_URL }}

  zap-pr-scan:
    uses: ./.github/workflows/zap-security-scan.yml
    secrets:
      SLACK_PROD_WEBHOOK_URL: ${{ secrets.SLACK_PROD_WEBHOOK_URL }}

  sca-pr-scan:
    uses: ./.github/workflows/sca-analysis.yml
    secrets:
      SLACK_PROD_WEBHOOK_URL: ${{ secrets.SLACK_PROD_WEBHOOK_URL }}

  check-for-preview-deploy:
    permissions:
      id-token: write
      contents: read
    if: contains(github.event.pull_request.labels.*.name, 'preview-deploy')
    needs: [ build-test, snyk-vulnerability-scan, zap-pr-scan, sca-pr-scan ]
    uses: ./.github/workflows/deploy-preview.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
    secrets: inherit